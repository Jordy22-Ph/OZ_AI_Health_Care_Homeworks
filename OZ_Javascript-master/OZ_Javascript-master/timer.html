<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>Timer API</h1>
    
    <button id="start">카운트다운 시작</button>
    <p id="time"></p>

    <script>
        /* 
        // setTimeout(함수, 시간(ms)): 일정 시간이 지난 뒤에 함수를 한 번 실행  
        function alertTimeout() {
            alert("타임아웃이 종료되었습니다.")
        }

        // 3s = 3000ms
        setTimeout(alertTimeout, 3000);
        */

        /* 
        setTimeout(함수, 시간(ms)): 일정 시간이 지난 뒤에 함수를 한 번 실행  
        setTimeout(() => alert("타임아웃이 종료되었습니다."), 3000);            | 위의 내용을 화살표함수로 1줄로 ~
        
        setInterval(함수, 시간(ms)): 일정 시간마다 함수를 반복 실행 
        setInterval(() => alert ("3초가 경과되었습니다."), 3000);
        */
    


        /* start 버튼에 이벤트 리스너를 추가한다 ?    
        ->  이 말은 start버튼에 어떤 특정 이벤트가 발생하면 그 이벤트에 따라서 후속적으로 동작해야하는 함수를 등록하겠다 
            DOM API 를 이욯해서 브라우저에게 그거를 위임하겠다~ 맡기겠다   이런 의미! 
        
        startBTN.addEventListener("click", () => {
            // 카운트다운 (n초 -> 0초)
        });    
        */

        const startBTN = document.querySelector("#start");
        const timeEl = document.querySelector("#time");
        
        let timeLeft = 10;                              //| 10초부터 시작하는 타이머 
        let timerId = null;
    
        // 카운트다운 시작 (10초 -> 0초)
        startBTN.addEventListener("click", () => {
            // 이미 등록된 타이머가 있으면, 무시
            if (timerId !== null) return;

            startBTN.disabled = true;
            timeEl.textContent = timeLeft;

            // 1초마다, timeLeft를 1 줄이고, 화면에 변경된 값을 출력
            timerId = setInterval(() => {
                timeLeft--;

                if (timeLeft === 0) {
                    // timer 중지
                    timeEl.textContent = "타이머 종료!"
                    clearInterval(timerId);
                    timeLeft = 10;
                    timerId = null;
                    startBTN.disabled = false;
                } else {
                    // timerLeft >= 0 인 경우, 계속 진행
                    timeEl.textContent = timeLeft;
                }
            }, 1000);
        });

</script>
</body>

</html>
